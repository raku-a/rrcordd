<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rrcord</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg-deep:    #0d0f14;
    --bg-mid:     #13161e;
    --bg-surface: #1a1e2a;
    --bg-hover:   #21263a;
    --bg-active:  #252d42;
    --accent:     #5b6af0;
    --accent-dim: #3d4ab8;
    --accent-glow:#5b6af044;
    --text-1:     #e8eaf6;
    --text-2:     #8b90b8;
    --text-3:     #555a7a;
    --border:     #1f2438;
    --online:     #3ddc84;
    --danger:     #e05c5c;
    --warn:       #f0a843;
    --r: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg-deep);
    color: var(--text-1);
    display: flex;
    height: 100vh;
    overflow: hidden;
    font-size: 14px;
  }

  /* ── SERVER RAIL ── */
  .server-rail {
    width: 64px;
    background: var(--bg-deep);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 0;
    gap: 6px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    scrollbar-width: none;
  }
  .server-rail::-webkit-scrollbar { display: none; }

  .server-icon {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--bg-surface);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 18px;
    transition: border-radius 0.18s ease, background 0.18s ease, transform 0.12s ease;
    position: relative;
    flex-shrink: 0;
    color: var(--text-2);
  }
  .server-icon:hover, .server-icon.active {
    border-radius: 14px;
    background: var(--accent);
    color: white;
    transform: scale(1.04);
  }
  .server-icon .pip {
    position: absolute;
    left: -8px;
    width: 4px; height: 16px;
    background: var(--text-1);
    border-radius: 0 4px 4px 0;
    transition: height 0.15s;
  }
  .server-icon:hover .pip { height: 8px; }
  .server-icon.active .pip { height: 36px; }
  .server-divider {
    width: 32px; height: 1px;
    background: var(--border);
    margin: 4px 0;
    flex-shrink: 0;
  }
  .server-add {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--bg-surface);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--online);
    font-size: 22px;
    transition: border-radius 0.18s, background 0.18s, transform 0.12s;
    flex-shrink: 0;
  }
  .server-add:hover { border-radius: 14px; background: var(--online); color: white; transform: scale(1.04); }

  /* ── CHANNEL SIDEBAR ── */
  .sidebar {
    width: 230px;
    background: var(--bg-mid);
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 16px 14px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
  }
  .sidebar-header:hover { background: var(--bg-hover); }
  .sidebar-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: .3px;
    color: var(--text-1);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sidebar-chevron { color: var(--text-2); font-size: 12px; }

  .channel-list { flex: 1; overflow-y: auto; padding: 8px 6px; scrollbar-width: thin; scrollbar-color: var(--bg-active) transparent; }
  .channel-list::-webkit-scrollbar { width: 4px; }
  .channel-list::-webkit-scrollbar-thumb { background: var(--bg-active); border-radius: 4px; }

  .channel-category {
    display: flex; align-items: center; gap: 4px;
    padding: 14px 6px 4px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-3);
    cursor: pointer;
    user-select: none;
  }
  .channel-category:hover { color: var(--text-2); }
  .channel-category .cat-arrow { font-size: 9px; transition: transform 0.15s; }

  .channel-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px;
    border-radius: 6px;
    cursor: pointer;
    color: var(--text-2);
    transition: background 0.1s, color 0.1s;
    position: relative;
  }
  .channel-item:hover { background: var(--bg-hover); color: var(--text-1); }
  .channel-item.active { background: var(--bg-active); color: var(--text-1); }
  .channel-item .ch-icon { font-size: 16px; flex-shrink: 0; color: var(--text-3); }
  .channel-item.active .ch-icon { color: var(--text-2); }
  .channel-item:hover .ch-icon { color: var(--text-2); }
  .channel-name { font-size: 14px; font-weight: 600; flex: 1; }
  .channel-badge {
    background: var(--danger);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 10px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* user panel */
  .user-panel {
    padding: 8px 10px;
    background: var(--bg-deep);
    border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .user-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    font-weight: 800;
    flex-shrink: 0;
    position: relative;
  }
  .user-avatar .status-dot {
    position: absolute;
    bottom: 0; right: 0;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--online);
    border: 2px solid var(--bg-deep);
  }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 13px; font-weight: 700; color: var(--text-1); }
  .user-tag { font-size: 11px; color: var(--text-3); font-family: 'JetBrains Mono', monospace; }
  .user-actions { display: flex; gap: 2px; }
  .user-action-btn {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: none;
    background: none;
    color: var(--text-2);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    transition: background 0.1s, color 0.1s;
  }
  .user-action-btn:hover { background: var(--bg-hover); color: var(--text-1); }

  /* ── MAIN CHAT ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg-surface);
    min-width: 0;
  }

  .chat-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    background: var(--bg-surface);
    flex-shrink: 0;
  }
  .chat-header .ch-type { font-size: 20px; color: var(--text-3); }
  .chat-header-name { font-size: 16px; font-weight: 700; }
  .chat-header-divider { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
  .chat-header-topic { font-size: 13px; color: var(--text-2); }
  .chat-header-actions { margin-left: auto; display: flex; gap: 4px; }
  .header-btn {
    width: 32px; height: 32px;
    border-radius: 6px; border: none;
    background: none; color: var(--text-2);
    cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s, color 0.1s;
  }
  .header-btn:hover { background: var(--bg-hover); color: var(--text-1); }

  /* messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
    scrollbar-width: thin;
    scrollbar-color: var(--bg-active) transparent;
  }
  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-thumb { background: var(--bg-active); border-radius: 4px; }

  .day-divider {
    display: flex; align-items: center; gap: 10px;
    margin: 16px 0 8px;
  }
  .day-divider span {
    font-size: 11px; font-weight: 700; color: var(--text-3);
    text-transform: uppercase; letter-spacing: 1px;
    white-space: nowrap;
    font-family: 'JetBrains Mono', monospace;
  }
  .day-divider::before, .day-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .msg-group {
    display: flex; gap: 12px;
    padding: 6px 8px;
    border-radius: 8px;
    transition: background 0.08s;
  }
  .msg-group:hover { background: var(--bg-hover); }
  .msg-group.consecutive { padding-top: 2px; padding-bottom: 2px; }
  .msg-group.consecutive:hover { background: var(--bg-hover); }

  .msg-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 800;
    margin-top: 2px;
  }
  .msg-avatar.placeholder { background: transparent; }
  .msg-avatar.placeholder:hover { background: transparent; }

  .msg-body { flex: 1; min-width: 0; }
  .msg-meta {
    display: flex; align-items: baseline; gap: 8px;
    margin-bottom: 3px;
  }
  .msg-author {
    font-size: 14px; font-weight: 700;
    cursor: pointer;
  }
  .msg-author:hover { text-decoration: underline; }
  .msg-author.is-bot { color: var(--accent); }
  .msg-author.is-mod { color: var(--warn); }
  .msg-timestamp {
    font-size: 11px; color: var(--text-3);
    font-family: 'JetBrains Mono', monospace;
  }
  .bot-badge {
    font-size: 9px; font-weight: 700; letter-spacing: .5px;
    background: var(--accent); color: white;
    padding: 1px 5px; border-radius: 4px;
    text-transform: uppercase; vertical-align: middle;
  }
  .mod-badge {
    font-size: 9px; font-weight: 700; letter-spacing: .5px;
    background: var(--warn); color: #0d0f14;
    padding: 1px 5px; border-radius: 4px;
    text-transform: uppercase; vertical-align: middle;
  }
  .msg-text {
    font-size: 14px; line-height: 1.55;
    color: var(--text-1);
    word-break: break-word;
  }
  .msg-text .mention {
    color: var(--accent);
    background: var(--accent-glow);
    border-radius: 3px;
    padding: 0 2px;
    cursor: pointer;
    font-weight: 600;
  }
  .msg-text .mention:hover { background: var(--accent); color: white; }
  .msg-text code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    background: var(--bg-deep);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    color: #e0a870;
  }
  .msg-reactions {
    display: flex; gap: 6px; margin-top: 5px; flex-wrap: wrap;
  }
  .reaction {
    display: flex; align-items: center; gap: 4px;
    background: var(--bg-hover);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 8px;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
    font-size: 13px;
  }
  .reaction:hover, .reaction.active {
    background: var(--accent-glow);
    border-color: var(--accent);
  }
  .reaction .r-count {
    font-size: 12px; font-weight: 700;
    color: var(--text-2);
    font-family: 'JetBrains Mono', monospace;
  }

  /* message embed */
  .msg-embed {
    margin-top: 6px;
    border-left: 3px solid var(--accent);
    background: var(--bg-mid);
    border-radius: 0 6px 6px 0;
    padding: 10px 14px;
    max-width: 480px;
  }
  .embed-title { font-weight: 700; font-size: 14px; color: var(--accent); margin-bottom: 4px; }
  .embed-desc { font-size: 13px; color: var(--text-2); line-height: 1.5; }

  /* consecutive indent */
  .consecutive .msg-body { padding-left: 50px; }

  /* ── INPUT AREA ── */
  .input-area {
    padding: 12px 16px 16px;
    flex-shrink: 0;
  }
  .input-box {
    background: var(--bg-hover);
    border-radius: 10px;
    border: 1px solid var(--border);
    display: flex; align-items: center; gap: 4px;
    padding: 4px 6px 4px 10px;
    transition: border-color 0.15s;
  }
  .input-box:focus-within { border-color: var(--accent); }
  .input-btn {
    width: 32px; height: 32px;
    border: none; background: none;
    color: var(--text-2); cursor: pointer;
    border-radius: 6px; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: color 0.1s, background 0.1s;
  }
  .input-btn:hover { color: var(--text-1); background: var(--bg-active); }
  .msg-input {
    flex: 1;
    border: none; background: none;
    color: var(--text-1);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    outline: none;
    padding: 6px 4px;
    resize: none;
    line-height: 1.5;
    max-height: 140px;
    scrollbar-width: thin;
  }
  .msg-input::placeholder { color: var(--text-3); }
  .send-btn {
    width: 32px; height: 32px;
    border: none;
    background: var(--accent);
    color: white;
    border-radius: 6px; font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.1s, transform 0.1s;
  }
  .send-btn:hover { background: var(--accent-dim); transform: scale(1.05); }
  .send-btn:active { transform: scale(0.96); }

  /* ── MEMBERS PANEL ── */
  .members-panel {
    width: 220px;
    background: var(--bg-mid);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 14px 8px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--bg-active) transparent;
    flex-shrink: 0;
  }
  .members-panel::-webkit-scrollbar { width: 4px; }
  .members-panel::-webkit-scrollbar-thumb { background: var(--bg-active); border-radius: 4px; }

  .members-category {
    font-size: 11px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--text-3); padding: 8px 8px 4px;
  }
  .member-item {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 8px; border-radius: 6px;
    cursor: pointer; transition: background 0.1s;
  }
  .member-item:hover { background: var(--bg-hover); }
  .member-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800;
    flex-shrink: 0; position: relative;
  }
  .member-avatar .sdot {
    position: absolute; bottom: 0; right: 0;
    width: 9px; height: 9px; border-radius: 50%;
    border: 2px solid var(--bg-mid);
  }
  .sdot.online { background: var(--online); }
  .sdot.idle { background: var(--warn); }
  .sdot.dnd { background: var(--danger); }
  .sdot.offline { background: var(--text-3); }
  .member-name { font-size: 13px; font-weight: 600; color: var(--text-2); }
  .member-item:hover .member-name { color: var(--text-1); }
  .member-role { font-size: 11px; color: var(--text-3); font-family: 'JetBrains Mono', monospace; }

  /* animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg-group { animation: fadeUp 0.18s ease; }

  /* scrollbar */
  * { scrollbar-width: thin; scrollbar-color: var(--bg-active) transparent; }

  /* ── MOBILE ── */
  @media (max-width: 680px) {
    body { flex-direction: column; height: 100dvh; }

    .server-rail { display: none; }
    .members-panel { display: none; }

    /* sidebar becomes a full-screen overlay */
    .sidebar {
      position: fixed; inset: 0;
      width: 100%; z-index: 100;
      transform: translateX(-100%);
      transition: transform 0.22s ease;
    }
    .sidebar.open { transform: translateX(0); }

    /* chat takes full height minus bottom nav */
    .main {
      flex: 1;
      min-height: 0;
      padding-bottom: 56px; /* space for bottom nav */
    }

    /* bottom nav bar */
    .bottom-nav {
      display: flex !important;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 56px;
      background: var(--bg-deep);
      border-top: 1px solid var(--border);
      z-index: 50;
    }
    .bottom-nav-btn {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 2px;
      background: none; border: none;
      color: var(--text-3);
      font-size: 20px;
      cursor: pointer;
      transition: color 0.1s;
    }
    .bottom-nav-btn span { font-size: 10px; font-family: 'JetBrains Mono', monospace; font-weight: 600; letter-spacing: .5px; }
    .bottom-nav-btn.active { color: var(--accent); }

    /* bigger tap targets in input */
    .input-area { padding: 8px 10px 10px; }
    .msg-input { font-size: 16px; } /* prevents iOS zoom */

    /* hide topic in header on small screens */
    .chat-header-divider, .chat-header-topic { display: none; }
    .chat-header { padding: 10px 12px; }

    /* back button shown on mobile */
    .back-btn { display: flex !important; }

    /* overlay backdrop */
    .sidebar-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 99;
    }
    .sidebar-backdrop.open { display: block; }
  }

  /* hidden on desktop, shown on mobile via media query */
  .bottom-nav { display: none; }
  .back-btn { display: none !important; }
</style>
</head>
<body>

<!-- SIDEBAR BACKDROP (mobile) -->
<div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>

<!-- SERVER RAIL -->
<div class="server-rail" id="serverRail"></div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-header">
    <span class="sidebar-title" id="serverName">Rrcord HQ</span>
    <span class="sidebar-chevron">▾</span>
  </div>
  <div class="channel-list" id="channelList"></div>
  <div class="user-panel">
    <div class="user-avatar">R<span class="status-dot"></span></div>
    <div class="user-info">
      <div class="user-name">Rrme</div>
      <div class="user-tag">#0001</div>
    </div>
    <div class="user-actions">
      <button class="user-action-btn" title="Mute">🎙</button>
      <button class="user-action-btn" title="Deafen">🎧</button>
      <button class="user-action-btn" title="Settings">⚙️</button>
    </div>
  </div>
</div>

<!-- MAIN CHAT -->
<div class="main">
  <div class="chat-header">
    <button class="header-btn back-btn" id="backBtn" title="Channels">◀</button>
    <span class="ch-type" id="chatIcon">#</span>
    <span class="chat-header-name" id="chatName">general</span>
    <div class="chat-header-divider"></div>
    <span class="chat-header-topic" id="chatTopic">Welcome to Rrcord — say something!</span>
    <div class="chat-header-actions">
      <button class="header-btn" title="Threads">🧵</button>
      <button class="header-btn" title="Pins">📌</button>
      <button class="header-btn" title="Members">👥</button>
      <button class="header-btn" title="Search">🔍</button>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <div class="input-box">
      <button class="input-btn" title="Add attachment">➕</button>
      <textarea class="msg-input" id="msgInput" placeholder="Message #general" rows="1"></textarea>
      <button class="input-btn" title="Emoji">😊</button>
      <button class="input-btn" title="GIF">GIF</button>
      <button class="send-btn" id="sendBtn" title="Send">➤</button>
    </div>
  </div>
</div>

<!-- MEMBERS PANEL -->
<div class="members-panel" id="membersPanel"></div>

<!-- BOTTOM NAV (mobile only) -->
<nav class="bottom-nav">
  <button class="bottom-nav-btn active" id="navChannels" onclick="openSidebar()">
    ☰<span>Channels</span>
  </button>
  <button class="bottom-nav-btn" id="navChat">
    💬<span>Chat</span>
  </button>
  <button class="bottom-nav-btn">
    👥<span>Members</span>
  </button>
  <button class="bottom-nav-btn">
    ⚙️<span>Settings</span>
  </button>
</nav>

<script>
// ── CONFIG — auto-detects host, works locally and through ngrok ───────────────
const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}`;

// ── DATA ──────────────────────────────────────────────────────────────────────
const servers = [
  { id: 1, emoji: '🎮', name: 'Rrcord HQ' },
  { id: 2, emoji: '🎨', name: 'Design Cave' },
  { id: 3, emoji: '🛠', name: 'Dev Den' },
  { id: 4, emoji: '🎵', name: 'Beats' },
];

const channels = [
  { id: 'gen',   cat: 'TEXT CHANNELS',  type: 'text',  name: 'general',       topic: 'Welcome to Rrcord!',         badge: 0 },
  { id: 'intro', cat: 'TEXT CHANNELS',  type: 'text',  name: 'introductions', topic: 'Introduce yourself 👋',       badge: 0 },
  { id: 'dev',   cat: 'TEXT CHANNELS',  type: 'text',  name: 'dev-talk',      topic: 'Code, bugs, late nights ☕',  badge: 0 },
  { id: 'memes', cat: 'TEXT CHANNELS',  type: 'text',  name: 'memes',         topic: 'No context needed',           badge: 0 },
  { id: 'vc1',   cat: 'VOICE CHANNELS', type: 'voice', name: 'Lounge',        topic: '',                            badge: 0 },
  { id: 'vc2',   cat: 'VOICE CHANNELS', type: 'voice', name: 'Gaming',        topic: '',                            badge: 0 },
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let activeServer  = 1;
let activeChannel = 'gen';
let messageData   = { gen: [], intro: [], dev: [], memes: [] };
let myUsername    = '';
let ws            = null;
let reconnectTimer = null;

// ── LOGIN SCREEN ──────────────────────────────────────────────────────────────
function showLogin() {
  const overlay = document.createElement('div');
  overlay.id = 'loginOverlay';
  overlay.style.cssText = `
    position:fixed;inset:0;background:rgba(13,15,20,0.97);
    display:flex;align-items:center;justify-content:center;z-index:999;
    font-family:'Syne',sans-serif;
  `;
  overlay.innerHTML = `
    <div style="background:#13161e;border:1px solid #1f2438;border-radius:14px;
                padding:36px 32px;width:320px;display:flex;flex-direction:column;gap:18px;
                box-shadow:0 24px 60px #0008;">
      <div style="font-size:26px;font-weight:800;color:#e8eaf6;letter-spacing:-.5px;">
        Rr<span style="color:#5b6af0">cord</span>
      </div>
      <div style="color:#8b90b8;font-size:14px;margin-top:-8px;">Enter a username to join</div>
      <input id="usernameInput" maxlength="24" placeholder="Your username…"
        style="background:#1a1e2a;border:1px solid #1f2438;border-radius:8px;
               padding:10px 14px;color:#e8eaf6;font-family:'Syne',sans-serif;
               font-size:15px;outline:none;transition:border-color .15s;"
        onfocus="this.style.borderColor='#5b6af0'"
        onblur="this.style.borderColor='#1f2438'" />
      <div id="loginStatus" style="font-size:13px;color:#e05c5c;min-height:18px;"></div>
      <button id="joinBtn"
        style="background:#5b6af0;border:none;border-radius:8px;padding:11px;
               color:white;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;
               cursor:pointer;transition:background .15s;"
        onmouseover="this.style.background='#3d4ab8'"
        onmouseout="this.style.background='#5b6af0'">
        Join Server →
      </button>
    </div>
  `;
  document.body.appendChild(overlay);

  const input = overlay.querySelector('#usernameInput');
  const btn   = overlay.querySelector('#joinBtn');
  const status = overlay.querySelector('#loginStatus');

  input.focus();

  function tryJoin() {
    const name = input.value.trim();
    if (!name) { status.textContent = 'Please enter a username.'; return; }
    myUsername = name;
    status.textContent = 'Connecting…';
    status.style.color = '#8b90b8';
    btn.disabled = true;
    connectWS(() => overlay.remove());
  }

  btn.addEventListener('click', tryJoin);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') tryJoin(); });
}

// ── WEBSOCKET ─────────────────────────────────────────────────────────────────
function connectWS(onSuccess) {
  if (ws) { try { ws.close(); } catch(_) {} }

  setConnectionStatus('connecting');
  ws = new WebSocket(WS_URL);

  ws.addEventListener('open', () => {
    setConnectionStatus('online');
    ws.send(JSON.stringify({ type: 'join', username: myUsername }));
    if (onSuccess) onSuccess();
    clearTimeout(reconnectTimer);

    // update user panel
    document.querySelector('.user-name').textContent = myUsername;
    document.querySelector('.user-avatar').childNodes[0].textContent = myUsername.slice(0,2).toUpperCase();
  });

  ws.addEventListener('message', e => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }

    if (msg.type === 'history') {
      messageData = msg.messages;
      renderMessages();
    }
    if (msg.type === 'message') {
      const ch = msg.message.channel;
      if (!messageData[ch]) messageData[ch] = [];
      messageData[ch].push(msg.message);
      if (ch === activeChannel) {
        appendMessage(msg.message);
      } else {
        const chObj = channels.find(c => c.id === ch);
        if (chObj) { chObj.badge = (chObj.badge || 0) + 1; renderChannels(); }
      }
    }
    if (msg.type === 'system') {
      appendSystemMessage(msg.text);
    }
    if (msg.type === 'members') {
      membersList = msg.members;
      renderMembers();
    }
  });

  ws.addEventListener('close', () => {
    setConnectionStatus('offline');
    reconnectTimer = setTimeout(() => connectWS(null), 3000);
  });

  ws.addEventListener('error', () => {
    if (onSuccess) {
      document.querySelector('#loginStatus').textContent = `Can't connect to server at ${WS_URL}`;
      document.querySelector('#loginStatus').style.color = '#e05c5c';
      document.querySelector('#joinBtn').disabled = false;
    }
    setConnectionStatus('offline');
  });
}

function setConnectionStatus(state) {
  const dot = document.querySelector('.user-avatar .status-dot');
  if (!dot) return;
  dot.style.background = state === 'online' ? 'var(--online)' : state === 'connecting' ? 'var(--warn)' : 'var(--danger)';
}

// ── RENDER HELPERS ────────────────────────────────────────────────────────────
function initials(name) { return (name || '?').slice(0,2).toUpperCase(); }

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatText(raw) {
  let t = escapeHtml(raw);
  t = t.replace(/@(\w+)/g, '<span class="mention">@$1</span>');
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  return t;
}

function renderServers() {
  const rail = document.getElementById('serverRail');
  rail.innerHTML = '';
  servers.forEach(s => {
    const el = document.createElement('div');
    el.className = 'server-icon' + (s.id === activeServer ? ' active' : '');
    el.title = s.name;
    el.innerHTML = `<span class="pip"></span>${s.emoji}`;
    el.onclick = () => { activeServer = s.id; document.getElementById('serverName').textContent = s.name; renderServers(); };
    rail.appendChild(el);
  });
  const div = document.createElement('div');
  div.className = 'server-divider';
  rail.appendChild(div);
  const add = document.createElement('div');
  add.className = 'server-add'; add.title = 'Add Server'; add.textContent = '+';
  rail.appendChild(add);
}

function renderChannels() {
  const list = document.getElementById('channelList');
  list.innerHTML = '';
  let lastCat = null;
  channels.forEach(ch => {
    if (ch.cat !== lastCat) {
      lastCat = ch.cat;
      const cat = document.createElement('div');
      cat.className = 'channel-category';
      cat.innerHTML = `<span class="cat-arrow">▾</span>${ch.cat}`;
      list.appendChild(cat);
    }
    const el = document.createElement('div');
    el.className = 'channel-item' + (ch.id === activeChannel ? ' active' : '');
    el.innerHTML = `
      <span class="ch-icon">${ch.type === 'voice' ? '🔊' : '#'}</span>
      <span class="channel-name">${ch.name}</span>
      ${ch.badge ? `<span class="channel-badge">${ch.badge}</span>` : ''}
    `;
    if (ch.type === 'text') el.onclick = () => selectChannel(ch.id);
    list.appendChild(el);
  });
}

function selectChannel(id) {
  activeChannel = id;
  const ch = channels.find(c => c.id === id);
  document.getElementById('chatIcon').textContent = '#';
  document.getElementById('chatName').textContent = ch.name;
  document.getElementById('chatTopic').textContent = ch.topic;
  document.querySelector('.msg-input').placeholder = `Message #${ch.name}`;
  ch.badge = 0;
  renderChannels();
  renderMessages();
  closeSidebar();
}

function buildMessageEl(msg, consecutive) {
  const group = document.createElement('div');
  group.className = 'msg-group' + (consecutive ? ' consecutive' : '');
  group.dataset.msgId = msg.id || '';

  const color = msg.color || '#888';
  const avatarHtml = consecutive
    ? `<div class="msg-avatar placeholder" style="width:38px;flex-shrink:0"></div>`
    : `<div class="msg-avatar" style="background:${color}">${initials(msg.author)}</div>`;

  const metaHtml = consecutive ? '' : `
    <div class="msg-meta">
      <span class="msg-author">${escapeHtml(msg.author)}</span>
      <span class="msg-timestamp">${msg.time}</span>
    </div>`;

  group.innerHTML = `
    ${avatarHtml}
    <div class="msg-body">
      ${metaHtml}
      <div class="msg-text">${formatText(msg.text)}</div>
    </div>
  `;
  return group;
}

function renderMessages() {
  const container = document.getElementById('messages');
  container.innerHTML = '';

  const msgs = messageData[activeChannel] || [];
  if (!msgs.length) {
    container.innerHTML = `<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-3);font-size:15px;">No messages yet. Be the first!</div>`;
    return;
  }

  const divEl = document.createElement('div');
  divEl.className = 'day-divider';
  divEl.innerHTML = '<span>Today</span>';
  container.appendChild(divEl);

  msgs.forEach((msg, i) => {
    const prev = msgs[i - 1];
    const consecutive = prev && prev.author === msg.author && (msg.ts - prev.ts) < 5 * 60 * 1000;
    container.appendChild(buildMessageEl(msg, consecutive));
  });

  container.scrollTop = container.scrollHeight;
}

function appendMessage(msg) {
  const container = document.getElementById('messages');
  const empty = container.querySelector('[style*="No messages"]');
  if (empty) {
    container.innerHTML = '';
    const divEl = document.createElement('div');
    divEl.className = 'day-divider';
    divEl.innerHTML = '<span>Today</span>';
    container.appendChild(divEl);
  }

  const msgs = messageData[activeChannel] || [];
  const prev = msgs[msgs.length - 2]; // second to last since msg was already pushed
  const consecutive = prev && prev.author === msg.author && (msg.ts - prev.ts) < 5 * 60 * 1000;
  const el = buildMessageEl(msg, consecutive);
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

function appendSystemMessage(text) {
  const container = document.getElementById('messages');
  if (activeChannel !== 'gen') return;
  const el = document.createElement('div');
  el.style.cssText = 'text-align:center;color:var(--text-3);font-size:12px;padding:6px 0;font-family:"JetBrains Mono",monospace;';
  el.textContent = text;
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

function renderMembers() {
  const panel = document.getElementById('membersPanel');
  panel.innerHTML = '';

  const online = membersList;
  if (!online.length) {
    const cat = document.createElement('div');
    cat.className = 'members-category';
    cat.textContent = 'ONLINE — 0';
    panel.appendChild(cat);
    return;
  }

  const cat = document.createElement('div');
  cat.className = 'members-category';
  cat.textContent = `ONLINE — ${online.length}`;
  panel.appendChild(cat);

  online.forEach(m => {
    const el = document.createElement('div');
    el.className = 'member-item';
    el.innerHTML = `
      <div class="member-avatar" style="background:${m.color || '#888'}">
        ${initials(m.name)}
        <span class="sdot online"></span>
      </div>
      <div>
        <div class="member-name">${escapeHtml(m.name)}</div>
      </div>
    `;
    panel.appendChild(el);
  });
}

// ── SEND MESSAGE ──────────────────────────────────────────────────────────────
function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    alert('Not connected to server!'); return;
  }
  ws.send(JSON.stringify({ type: 'message', channel: activeChannel, text }));
  input.value = '';
  input.style.height = 'auto';
}

document.getElementById('sendBtn').addEventListener('click', sendMessage);
document.getElementById('msgInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('msgInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 140) + 'px';
});

// ── MOBILE SIDEBAR ────────────────────────────────────────────────────────────
function openSidebar() {
  document.querySelector('.sidebar').classList.add('open');
  document.getElementById('sidebarBackdrop').classList.add('open');
}
function closeSidebar() {
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('sidebarBackdrop').classList.remove('open');
}
document.getElementById('backBtn').addEventListener('click', openSidebar);

// ── BOOT ──────────────────────────────────────────────────────────────────────
renderServers();
renderChannels();
renderMessages();
renderMembers();
showLogin();
</script>
</body>
</html>
